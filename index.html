<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>生活学习管理系统（全模块云同步版）</title>
  <style>
    * { box-sizing: border-box; }
    :root{
      --bg:#f6f7fb;
      --panel:rgba(255,255,255,.9);
      --line:rgba(15,23,42,.08);
      --text:#111827;
      --muted:#6b7280;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --primary:#111827;
      --safe-bottom:max(16px, env(safe-area-inset-bottom));
      --safe-top:max(16px, env(safe-area-inset-top));
      --radius:24px;
    }
    html, body { min-height:100%; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(191,219,254,.45), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(221,214,254,.38), transparent 24%),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 100%);
    }
    .wrap{
      max-width:1140px;
      margin:0 auto;
      padding:calc(12px + var(--safe-top)) 14px calc(98px + var(--safe-bottom));
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .title small{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--line);
      color:#4b5563;
      margin-bottom:10px;
      backdrop-filter:blur(10px);
      font-size:13px;
    }
    h1{
      margin:0;
      font-size:32px;
      letter-spacing:-.03em;
      line-height:1.1;
    }
    .sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
      max-width:760px;
    }
    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    button{
      font:inherit;
      border:none;
      cursor:pointer;
      transition:.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn{
      min-height:46px;
      padding:11px 16px;
      border-radius:16px;
      background:rgba(255,255,255,.88);
      border:1px solid var(--line);
      color:#374151;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
    }
    .btn.primary{
      background:var(--primary);
      color:#fff;
      border-color:transparent;
    }
    .auth-box{
      margin:16px 0;
      padding:16px;
      border-radius:20px;
      background:rgba(255,255,255,.9);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }
    .auth-grid{
      display:grid;
      gap:10px;
      max-width:460px;
    }
    .text-input{
      width:100%;
      height:46px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid rgba(15,23,42,.12);
      font:inherit;
      background:#fff;
      outline:none;
    }
    .hero{
      padding:18px;
      border-radius:24px;
      background:var(--panel);
      border:1px solid var(--line);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }
    .hero-title{
      font-size:22px;
      margin:0 0 8px;
      line-height:1.25;
    }
    .hero-desc{
      margin:0;
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .statusbar{
      margin-top:12px;
      color:#4b5563;
      font-size:13px;
      line-height:1.7;
    }
    .crumbs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:14px 0 18px;
    }
    .crumb{
      padding:7px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--line);
      color:#4b5563;
      font-size:13px;
      backdrop-filter:blur(10px);
    }
    .view{ display:none; }
    .view.active{ display:block; }
    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:14px;
    }
    .card{
      min-height:200px;
      padding:20px;
      border-radius:24px;
      background:var(--panel);
      border:1px solid var(--line);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    .card:before{
      content:"";
      position:absolute;
      inset:auto -30px -30px auto;
      width:110px;
      height:110px;
      border-radius:50%;
      background:rgba(15,23,42,.04);
    }
    .icon{
      width:52px;
      height:52px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.95);
      border:1px solid rgba(15,23,42,.06);
      font-size:25px;
      margin-bottom:16px;
      position:relative;
      z-index:1;
    }
    .card h3{
      margin:0 0 8px;
      font-size:24px;
      line-height:1.2;
      position:relative;
      z-index:1;
    }
    .card p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
      position:relative;
      z-index:1;
    }
    .enter{
      margin-top:18px;
      align-self:flex-start;
      min-height:44px;
      padding:10px 14px;
      border-radius:14px;
      background:#111827;
      color:white;
      box-shadow:0 10px 20px rgba(17,24,39,.12);
      position:relative;
      z-index:1;
    }
    .section{
      padding:18px;
      border-radius:24px;
      background:var(--panel);
      border:1px solid var(--line);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }
    .section h2{
      margin:0 0 10px;
      font-size:24px;
      line-height:1.25;
    }
    .section p{
      margin:0;
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .mini-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
    }
    .mini-card{
      padding:16px;
      border-radius:20px;
      background:rgba(255,255,255,.9);
      border:1px solid var(--line);
      min-height:148px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .mini-card .mini-icon{
      font-size:24px;
      margin-bottom:10px;
    }
    .mini-card h4{
      margin:0 0 6px;
      font-size:18px;
      line-height:1.25;
    }
    .mini-card p{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }
    .ghost{
      margin-top:14px;
      align-self:flex-start;
      min-height:42px;
      padding:9px 13px;
      border-radius:13px;
      background:white;
      border:1px solid var(--line);
      color:#374151;
    }
    .single{
      max-width:960px;
    }
    .page-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }
    .back-btn{
      min-height:44px;
      padding:10px 14px;
      border-radius:14px;
      background:#fff;
      border:1px solid var(--line);
      color:#374151;
    }
    .editor{
      margin-top:16px;
      display:grid;
      gap:12px;
    }
    .label{
      color:#4b5563;
      font-size:14px;
      font-weight:600;
    }
    textarea{
      width:100%;
      min-height:180px;
      resize:vertical;
      border:none;
      outline:none;
      padding:16px 18px;
      border-radius:18px;
      background:rgba(255,255,255,.97);
      border:1px solid var(--line);
      box-shadow: inset 0 1px 1px rgba(15,23,42,.02);
      font:inherit;
      font-size:16px;
      color:var(--text);
      line-height:1.8;
    }
    .small-textarea{
      min-height:100px;
    }
    .hint{
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }
    .item-form{
      display:grid;
      gap:10px;
    }
    .item-input{
      width:100%;
      min-height:44px;
      padding:12px 14px;
      border-radius:14px;
      background:#fff;
      border:1px solid var(--line);
      font:inherit;
      outline:none;
    }
    .item-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .items-list{
      display:grid;
      gap:10px;
      margin-top:6px;
    }
    .item-card{
      background:rgba(255,255,255,.96);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }
    .item-card-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:8px;
    }
    .item-title{
      font-weight:700;
      font-size:15px;
      line-height:1.5;
    }
    .item-time{
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
    }
    .item-content{
      white-space:pre-wrap;
      color:var(--text);
      font-size:14px;
      line-height:1.8;
      margin-top:4px;
    }
    .item-buttons{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .small-btn{
      min-height:34px;
      padding:6px 10px;
      border-radius:12px;
      background:#fff;
      border:1px solid var(--line);
      color:#374151;
      box-shadow:none;
    }
    .small-btn.danger{
      color:#b91c1c;
    }
    .empty-box{
      padding:16px;
      border:1px dashed rgba(15,23,42,.12);
      border-radius:16px;
      color:var(--muted);
      font-size:13px;
      background:rgba(255,255,255,.55);
    }
    #toast{
      position:fixed;
      left:50%;
      bottom:calc(76px + var(--safe-bottom));
      transform:translate(-50%, 8px);
      background:#111827;
      color:#fff;
      padding:12px 14px;
      border-radius:14px;
      box-shadow:0 10px 24px rgba(17,24,39,.18);
      font-size:14px;
      opacity:0;
      pointer-events:none;
      transition:.25s ease;
      max-width:90vw;
      text-align:center;
      z-index:30;
    }
    #toast.show{
      opacity:1;
      transform:translate(-50%, 0);
    }
    input[type="file"]{ display:none; }
    .mobile-bar{
      position:fixed;
      left:12px;
      right:12px;
      bottom:calc(12px + var(--safe-bottom));
      display:none;
      grid-template-columns:1fr 1fr;
      gap:10px;
      z-index:25;
    }
    .mobile-btn{
      min-height:52px;
      border-radius:18px;
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      box-shadow:0 10px 26px rgba(15,23,42,.10);
      color:#111827;
      font-weight:600;
      backdrop-filter:blur(14px);
    }
    @media (max-width: 900px){
      .grid, .mini-grid{ grid-template-columns:1fr; }
    }
    @media (max-width: 720px){
      .wrap{ padding-left:12px; padding-right:12px; }
      h1{ font-size:28px; }
      .top{ align-items:stretch; }
      .btns{ width:100%; justify-content:stretch; display:grid; grid-template-columns:1fr 1fr; }
      .btn{ width:100%; min-height:48px; padding:10px 12px; font-size:14px; }
      .hero, .section, .card{ padding:16px; border-radius:22px; }
      .hero-title{ font-size:20px; }
      .card{ min-height:180px; }
      .page-actions{ display:none; }
      .mobile-bar{ display:grid; }
      textarea{ min-height:150px; }
      .small-textarea{ min-height:90px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="authBox" class="auth-box">
      <div class="auth-grid">
        <input id="emailInput" class="text-input" type="email" placeholder="请输入邮箱">
        <input id="passwordInput" class="text-input" type="password" placeholder="请输入密码（至少 6 位）">
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button id="registerBtn" class="btn primary">注册</button>
          <button id="loginBtn" class="btn">登录</button>
          <button id="logoutBtn" class="btn">退出登录</button>
        </div>
        <div id="authStatus" style="font-size:14px;color:#6b7280;">当前未登录</div>
      </div>
    </div>

    <div class="top">
      <div class="title">
        <small>☁️ 生活学习管理系统（全模块云同步版）</small>
        <h1>我的主页</h1>
        <p class="sub">现在五个模块都支持账号级同步。文本内容自动同步；每个模块的条目列表也支持新增、编辑、删除，并在手机和电脑之间同步。</p>
      </div>
      <div class="btns">
        <button class="btn" onclick="showView('home')">首页</button>
        <button class="btn" onclick="showView('pingpong')">乒乓球</button>
      </div>
    </div>

    <div class="hero">
      <h2 class="hero-title" id="heroTitle">三个主模块</h2>
      <p class="hero-desc" id="heroDesc">乒乓球、Anki 卡牌、论文。登录同一账号后，所有模块内容会自动同步。</p>
      <div class="statusbar" id="saveStatus">状态：已就绪</div>
    </div>

    <div class="crumbs" id="crumbs"></div>

    <section class="view active" id="homeView">
      <div class="grid">
        <div class="card"><div><div class="icon">🏓</div><h3>乒乓球</h3><p>训练相关内容。</p></div><button class="enter" onclick="showView('pingpong')">进入</button></div>
        <div class="card"><div><div class="icon">🧠</div><h3>Anki 卡牌</h3><p>记忆与复习。</p></div><button class="enter" onclick="showView('anki')">进入</button></div>
        <div class="card"><div><div class="icon">📄</div><h3>论文</h3><p>阅读与写作。</p></div><button class="enter" onclick="showView('paper')">进入</button></div>
      </div>
    </section>

    <section class="view" id="pingpongView">
      <div class="section">
        <h2>乒乓球</h2>
        <p>进入后分成三个子模块。每个子模块现在都支持文本内容同步和条目列表同步。</p>
        <div class="mini-grid" style="margin-top:14px;">
          <div class="mini-card"><div><div class="mini-icon">🏋️</div><h4>健身房</h4><p>力量与体能。</p></div><button class="ghost" onclick="showView('gym')">进入</button></div>
          <div class="mini-card"><div><div class="mini-icon">🎯</div><h4>发球机</h4><p>线路与训练。</p></div><button class="ghost" onclick="showView('machine')">进入</button></div>
          <div class="mini-card"><div><div class="mini-icon">📘</div><h4>教学大纲</h4><p>内容与结构。</p></div><button class="ghost" onclick="showView('syllabus')">进入</button></div>
        </div>
        <div class="page-actions"><button class="back-btn" onclick="showView('home')">返回首页</button></div>
      </div>
    </section>

    <section class="view" id="gymView"><div class="section single" id="module-gym"></div></section>
    <section class="view" id="machineView"><div class="section single" id="module-machine"></div></section>
    <section class="view" id="syllabusView"><div class="section single" id="module-syllabus"></div></section>
    <section class="view" id="ankiView"><div class="section single" id="module-anki"></div></section>
    <section class="view" id="paperView"><div class="section single" id="module-paper"></div></section>
  </div>

  <div class="mobile-bar">
    <button class="mobile-btn" id="mobileBackBtn">返回</button>
    <button class="mobile-btn" onclick="showView('home')">首页</button>
  </div>
  <div id="toast"></div>

  <script>
    const MODULE_META = {
      gym: { title:'健身房', desc:'记录训练计划、完成情况和训练条目。', icon:'🏋️', parent:'pingpong', listLabel:'训练条目', textLabel:'训练计划 / 总体记录' },
      machine: { title:'发球机', desc:'记录训练线路、频率、模板和复盘。', icon:'🎯', parent:'pingpong', listLabel:'训练模板', textLabel:'发球机总内容' },
      syllabus: { title:'乒乓球教学大纲', desc:'记录技术结构、章节与阶段安排。', icon:'📘', parent:'pingpong', listLabel:'大纲条目', textLabel:'教学大纲总内容' },
      anki: { title:'Anki 卡牌', desc:'记录牌组安排、复习计划和错卡整理。', icon:'🧠', parent:'home', listLabel:'复习条目', textLabel:'Anki 总内容' },
      paper: { title:'论文', desc:'记录待读论文、笔记和写作推进。', icon:'📄', parent:'home', listLabel:'论文条目', textLabel:'论文总内容' }
    };

    let currentView = 'home';

    const parentMap = { home:'home', pingpong:'home', gym:'pingpong', machine:'pingpong', syllabus:'pingpong', anki:'home', paper:'home' };
    const views = {
      home: document.getElementById('homeView'),
      pingpong: document.getElementById('pingpongView'),
      gym: document.getElementById('gymView'),
      machine: document.getElementById('machineView'),
      syllabus: document.getElementById('syllabusView'),
      anki: document.getElementById('ankiView'),
      paper: document.getElementById('paperView')
    };
    const meta = {
      home: { title:'三个主模块', desc:'乒乓球、Anki 卡牌、论文。登录同一账号后，所有模块内容会自动同步。', crumbs:['首页'] },
      pingpong: { title:'乒乓球', desc:'包含健身房、发球机、教学大纲。', crumbs:['首页','乒乓球'] },
      gym: { title:'健身房', desc:'健身房模块中的文本和条目列表都会同步。', crumbs:['首页','乒乓球','健身房'] },
      machine: { title:'发球机', desc:'发球机模块中的文本和条目列表都会同步。', crumbs:['首页','乒乓球','发球机'] },
      syllabus: { title:'乒乓球教学大纲', desc:'教学大纲模块中的文本和条目列表都会同步。', crumbs:['首页','乒乓球','教学大纲'] },
      anki: { title:'Anki 卡牌', desc:'Anki 模块中的文本和条目列表都会同步。', crumbs:['首页','Anki 卡牌'] },
      paper: { title:'论文', desc:'论文模块中的文本和条目列表都会同步。', crumbs:['首页','论文'] }
    };

    function buildModulePages() {
      Object.entries(MODULE_META).forEach(([key, item]) => {
        const container = document.getElementById(`module-${key}`);
        container.innerHTML = `
          <h2>${item.title}</h2>
          <p>${item.desc}</p>

          <div class="editor">
            <div class="label">${item.textLabel}（自动同步）</div>
            <textarea id="${key}-text" placeholder="请输入 ${item.title} 的总内容..."></textarea>
            <div class="hint">停止输入约 800ms 后会自动保存到云端。</div>
          </div>

          <div class="editor">
            <div class="label">${item.listLabel}（增删改查，自动同步）</div>
            <div class="item-form">
              <input id="${key}-item-title" class="item-input" type="text" placeholder="请输入标题">
              <textarea id="${key}-item-content" class="small-textarea" placeholder="请输入内容"></textarea>
              <div class="item-actions">
                <button class="btn primary" id="${key}-item-submit">添加条目</button>
                <button class="btn" id="${key}-item-cancel">取消编辑</button>
              </div>
            </div>
            <div class="hint">每个模块都带一个同步条目列表，你可以新增、编辑、删除。</div>
          </div>

          <div class="editor">
            <div class="label">${item.listLabel}列表</div>
            <div id="${key}-items-list" class="items-list"></div>
          </div>

          <div class="page-actions">
            <button class="back-btn" onclick="showView('${item.parent}')">返回${item.parent === 'pingpong' ? '乒乓球' : '首页'}</button>
            <button class="back-btn" onclick="showView('home')">返回首页</button>
          </div>
        `;
      });
    }

    function renderCrumbs(arr){ document.getElementById('crumbs').innerHTML = arr.map(i => `<span class="crumb">${i}</span>`).join(''); }
    function updateMobileBack(){
      const btn = document.getElementById('mobileBackBtn');
      if (currentView === 'home') { btn.textContent = '当前首页'; btn.disabled = true; btn.style.opacity = '.55'; }
      else { btn.textContent = '返回'; btn.disabled = false; btn.style.opacity = '1'; }
    }
    function showView(name){
      currentView = name;
      Object.values(views).forEach(v => v.classList.remove('active'));
      views[name].classList.add('active');
      document.getElementById('heroTitle').textContent = meta[name].title;
      document.getElementById('heroDesc').textContent = meta[name].desc;
      renderCrumbs(meta[name].crumbs);
      updateMobileBack();
      window.scrollTo({top:0, behavior:'smooth'});
    }
    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    document.getElementById('mobileBackBtn').addEventListener('click', () => {
      if (currentView !== 'home') showView(parentMap[currentView] || 'home');
    });

    window.showView = showView;
    window.showToast = showToast;

    buildModulePages();
    renderCrumbs(meta.home.crumbs);
    updateMobileBack();
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      collection,
      addDoc,
      deleteDoc,
      query,
      orderBy,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCKXYFGsmoHNQKgB4-dJJf-aBhYj3zvNkQ",
      authDomain: "life-study-app.firebaseapp.com",
      projectId: "life-study-app",
      storageBucket: "life-study-app.firebasestorage.app",
      messagingSenderId: "368915786752",
      appId: "1:368915786752:web:41b39136af139356e3fce5",
      measurementId: "G-6S5GMKQ7EV"
    };

    const MODULE_KEYS = Object.keys(MODULE_META);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUid = null;
    const unsubDocMap = {};
    const unsubItemsMap = {};
    const textSaveTimers = {};
    const localState = {};
    const editState = {};

    MODULE_KEYS.forEach(key => {
      localState[key] = { text:'', items:[] };
      editState[key] = { editingId:null };
    });

    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const registerBtn = document.getElementById("registerBtn");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const authStatus = document.getElementById("authStatus");
    const saveStatus = document.getElementById("saveStatus");

    function moduleDocRef(uid, key) {
      return doc(db, "users", uid, "modules", key);
    }
    function moduleItemsCollection(uid, key) {
      return collection(db, "users", uid, "modules", key, "items");
    }

    function setStatus(text) {
      saveStatus.textContent = text;
    }

    function safeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function fillModuleText(key, value) {
      const textarea = document.getElementById(`${key}-text`);
      if (!textarea) return;
      if (document.activeElement !== textarea) {
        textarea.value = value || '';
      }
    }

    function fillModuleItems(key, items) {
      const list = document.getElementById(`${key}-items-list`);
      if (!list) return;
      if (!items.length) {
        list.innerHTML = '<div class="empty-box">还没有条目，先添加第一条吧。</div>';
        return;
      }

      list.innerHTML = items.map(item => {
        const timeText = item.updatedAt ? new Date(item.updatedAt).toLocaleString('zh-CN') : '刚刚';
        return `
          <div class="item-card">
            <div class="item-card-top">
              <div>
                <div class="item-title">${safeHtml(item.title || '未命名条目')}</div>
                <div class="item-time">${timeText}</div>
              </div>
              <div class="item-buttons">
                <button class="small-btn" onclick="window.editModuleItem('${key}','${item.id}')">编辑</button>
                <button class="small-btn danger" onclick="window.deleteModuleItem('${key}','${item.id}')">删除</button>
              </div>
            </div>
            <div class="item-content">${safeHtml(item.content || '').replace(/\n/g,'<br>')}</div>
          </div>
        `;
      }).join('');
    }

    function resetItemForm(key) {
      editState[key].editingId = null;
      const title = document.getElementById(`${key}-item-title`);
      const content = document.getElementById(`${key}-item-content`);
      const submit = document.getElementById(`${key}-item-submit`);
      if (title) title.value = '';
      if (content) content.value = '';
      if (submit) submit.textContent = '添加条目';
    }

    function bindModuleUI() {
      MODULE_KEYS.forEach(key => {
        const textarea = document.getElementById(`${key}-text`);
        textarea.addEventListener('input', () => {
          if (!currentUid) {
            setStatus('状态：请先登录后再同步');
            return;
          }
          clearTimeout(textSaveTimers[key]);
          textSaveTimers[key] = setTimeout(async () => {
            try {
              await setDoc(moduleDocRef(currentUid, key), {
                text: textarea.value,
                updatedAt: Date.now()
              }, { merge: true });
              setStatus(`状态：${MODULE_META[key].title} 已同步`);
            } catch (error) {
              console.error(error);
              setStatus(`状态：${MODULE_META[key].title} 同步失败`);
              window.showToast(`${MODULE_META[key].title} 同步失败`);
            }
          }, 800);
        });

        document.getElementById(`${key}-item-submit`).addEventListener('click', async () => {
          if (!currentUid) return window.showToast('请先登录');
          const titleInput = document.getElementById(`${key}-item-title`);
          const contentInput = document.getElementById(`${key}-item-content`);
          const title = titleInput.value.trim();
          const content = contentInput.value.trim();

          if (!title && !content) return window.showToast('先输入一点内容');

          try {
            if (editState[key].editingId) {
              await setDoc(doc(db, "users", currentUid, "modules", key, "items", editState[key].editingId), {
                title,
                content,
                updatedAt: Date.now()
              }, { merge: true });
              window.showToast('已更新条目');
            } else {
              await addDoc(moduleItemsCollection(currentUid, key), {
                title,
                content,
                createdAt: Date.now(),
                updatedAt: Date.now()
              });
              window.showToast('已添加条目');
            }
            resetItemForm(key);
          } catch (error) {
            console.error(error);
            window.showToast('保存条目失败');
          }
        });

        document.getElementById(`${key}-item-cancel`).addEventListener('click', () => {
          resetItemForm(key);
        });
      });
    }

    function stopAllWatchers() {
      MODULE_KEYS.forEach(key => {
        if (unsubDocMap[key]) { unsubDocMap[key](); unsubDocMap[key] = null; }
        if (unsubItemsMap[key]) { unsubItemsMap[key](); unsubItemsMap[key] = null; }
      });
    }

    function watchAllModules(uid) {
      stopAllWatchers();
      MODULE_KEYS.forEach(key => {
        unsubDocMap[key] = onSnapshot(moduleDocRef(uid, key), (snap) => {
          const data = snap.exists() ? snap.data() : {};
          localState[key].text = data.text || '';
          fillModuleText(key, localState[key].text);
        });

        const q = query(moduleItemsCollection(uid, key), orderBy("updatedAt", "desc"));
        unsubItemsMap[key] = onSnapshot(q, (snapshot) => {
          const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          localState[key].items = items;
          fillModuleItems(key, items);
        });
      });
      setStatus('状态：已连接云端同步');
    }

    registerBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) {
        authStatus.textContent = "请先输入邮箱和密码";
        return;
      }
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        authStatus.textContent = "注册成功，已自动登录";
      } catch (error) {
        authStatus.textContent = "注册失败：" + error.code + " / " + error.message;
        console.error("注册失败", error.code, error.message, error);
      }
    });

    loginBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) {
        authStatus.textContent = "请先输入邮箱和密码";
        return;
      }
      try {
        await signInWithEmailAndPassword(auth, email, password);
        authStatus.textContent = "登录成功";
      } catch (error) {
        authStatus.textContent = "登录失败：" + error.code + " / " + error.message;
        console.error("登录失败", error.code, error.message, error);
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        authStatus.textContent = "已退出登录";
      } catch (error) {
        authStatus.textContent = "退出失败：" + error.code + " / " + error.message;
        console.error("退出失败", error.code, error.message, error);
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUid = user.uid;
        authStatus.textContent = "当前已登录：" + user.email;
        console.log("当前用户 UID:", user.uid);
        watchAllModules(user.uid);
      } else {
        currentUid = null;
        authStatus.textContent = "当前未登录";
        stopAllWatchers();
        MODULE_KEYS.forEach(key => {
          fillModuleText(key, '');
          fillModuleItems(key, []);
          resetItemForm(key);
        });
        setStatus('状态：未登录，尚未连接云端');
      }
    });

    window.editModuleItem = function(key, itemId) {
      const item = (localState[key]?.items || []).find(x => x.id === itemId);
      if (!item) return;
      editState[key].editingId = itemId;
      document.getElementById(`${key}-item-title`).value = item.title || '';
      document.getElementById(`${key}-item-content`).value = item.content || '';
      document.getElementById(`${key}-item-submit`).textContent = '保存修改';
      window.showToast('已载入条目，可直接修改');
    };

    window.deleteModuleItem = async function(key, itemId) {
      if (!currentUid) return window.showToast('请先登录');
      try {
        await deleteDoc(doc(db, "users", currentUid, "modules", key, "items", itemId));
        if (editState[key].editingId === itemId) resetItemForm(key);
        window.showToast('已删除条目');
      } catch (error) {
        console.error(error);
        window.showToast('删除失败');
      }
    };

    bindModuleUI();
    console.log("Firebase 已连接成功");
  </script>
</body>
</html>
